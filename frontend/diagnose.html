<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>诊断页面 - FollowUp Pilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-2xl w-full bg-white rounded-lg shadow-lg p-8">
    <h1 class="text-2xl font-bold text-teal-600 mb-6">🔍 CDN 资源加载诊断</h1>
    
    <div id="results" class="space-y-4">
      <div class="p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
        <p class="text-sm text-yellow-800">⏳ 正在检测 CDN 资源...</p>
      </div>
    </div>
    
    <div class="mt-6 pt-6 border-t border-gray-200">
      <a href="/" class="inline-block bg-teal-500 hover:bg-teal-600 text-white px-6 py-3 rounded-lg font-medium transition-colors">
        ← 返回主页面
      </a>
    </div>
  </div>
  
  <script>
    const results = document.getElementById('results');
    
    // 检测 Tailwind CSS
    setTimeout(() => {
      const testEl = document.createElement('div');
      testEl.className = 'hidden';
      document.body.appendChild(testEl);
      const tailwindLoaded = getComputedStyle(testEl).display === 'none';
      document.body.removeChild(testEl);
      
      let html = '';
      
      if (tailwindLoaded) {
        html += '<div class="p-4 bg-green-50 border border-green-200 rounded-lg">';
        html += '<p class="font-semibold text-green-700">✅ Tailwind CSS 加载成功</p>';
        html += '<p class="text-xs text-green-600 mt-1">样式系统正常工作</p>';
        html += '</div>';
      } else {
        html += '<div class="p-4 bg-red-50 border border-red-200 rounded-lg">';
        html += '<p class="font-semibold text-red-700">❌ Tailwind CSS 加载失败</p>';
        html += '<p class="text-xs text-red-600 mt-1">请检查网络连接或防火墙设置</p>';
        html += '</div>';
      }
      
      // 检测 Lucide Icons
      const lucideLoaded = typeof lucide !== 'undefined';
      if (lucideLoaded) {
        html += '<div class="p-4 bg-green-50 border border-green-200 rounded-lg">';
        html += '<p class="font-semibold text-green-700">✅ Lucide Icons 加载成功</p>';
        html += '<p class="text-xs text-green-600 mt-1">图标库可用</p>';
        html += '</div>';
      } else {
        html += '<div class="p-4 bg-red-50 border border-red-200 rounded-lg">';
        html += '<p class="font-semibold text-red-700">❌ Lucide Icons 加载失败</p>';
        html += '<p class="text-xs text-red-600 mt-1">图标将无法显示，但不影响功能</p>';
        html += '</div>';
      }
      
      // 建议
      html += '<div class="p-4 bg-blue-50 border border-blue-200 rounded-lg">';
      html += '<p class="font-semibold text-blue-700">💡 建议操作：</p>';
      html += '<ul class="text-sm text-blue-600 mt-2 space-y-1 list-disc list-inside">';
      html += '<li>按 Ctrl+F5 强制刷新主页面</li>';
      html += '<li>清除浏览器缓存后重试</li>';
      html += '<li>使用无痕模式访问 http://localhost:8080/</li>';
      html += '<li>检查浏览器控制台（F12）是否有错误</li>';
      html += '</ul>';
      html += '</div>';
      
      results.innerHTML = html;
    }, 1000);
  </script>
</body>
</html>
