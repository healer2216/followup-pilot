<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试页面 - FollowUp Pilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8 text-center">
    <h1 class="text-2xl font-bold text-teal-600 mb-4">✅ 服务器正常工作！</h1>
    <p class="text-gray-600 mb-6">如果您能看到这个页面，说明 FastAPI 后端服务运行正常。</p>
    
    <div class="border-t border-gray-200 pt-6 mt-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-3">患者画像和循证统计修复说明：</h2>
      <ul class="text-left text-sm text-gray-600 space-y-2">
        <li class="flex items-start gap-2">
          <span class="text-green-500">✓</span>
          <span>已添加根路径路由（<code>/</code>）返回 index.html</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-green-500">✓</span>
          <span>已更新占位符提示文本</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-yellow-500">⚠</span>
          <span>请<strong>清除浏览器缓存</strong>后访问：<a href="/" class="text-teal-600 underline">http://localhost:8080/</a></span>
        </li>
      </ul>
    </div>
    
    <div class="mt-6">
      <a href="/" class="inline-block bg-teal-500 hover:bg-teal-600 text-white px-6 py-3 rounded-lg font-medium transition-colors">
        返回主页面 →
      </a>
    </div>
  </div>
</body>
</html>

</html>
